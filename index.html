<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>私の日記</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ログイン画面 -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-box">
      <h1>私の日記</h1>
      <p class="auth-subtitle">ログインまたは新規登録</p>

      <input type="email" id="auth-email" placeholder="メールアドレス">
      <input type="password" id="auth-password" placeholder="パスワード（6文字以上）">

      <button id="login-btn">ログイン</button>
      <button id="signup-btn" class="secondary">新規登録</button>

      <p id="auth-error" class="auth-error"></p>
    </div>
  </div>

  <!-- 日記アプリ画面 -->
  <div id="app-screen" class="app-screen hidden">
    <div class="container">
      <header>
        <h1>私の日記</h1>
        <button id="logout-btn">ログアウト</button>
      </header>

      <section class="editor">
        <div class="editor-fields">
          <input type="date" id="date-input">
          <input type="text" id="title-input" placeholder="タイトル（任意）">
        </div>
        <textarea id="content-input" placeholder="今日の出来事を書いてみましょう..."></textarea>
        <div id="editor-btns">
          <button id="save-btn">保存する</button>
          <button id="delete-edit-btn" class="hidden">削除する</button>
        </div>
      </section>

      <section class="entries">
        <h2>過去の日記</h2>
        <div id="entries-list"></div>
      </section>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
